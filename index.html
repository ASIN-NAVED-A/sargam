<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SARGAM GECB 2026</title>

  <!-- Google Fonts: Space Grotesk & Outfit -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700;900&family=Space+Grotesk:wght@400;600;700&display=swap"
    rel="stylesheet">

  <script>
    // Force manual scroll restoration to prevent browser from auto-scolling to old positions on reload
    if ('scrollRestoration' in history) {
      history.scrollRestoration = 'manual';
    }
    // Immediately reset scroll to top of viewport
    window.scrollTo(0, 0);
    // Strip any hash fragments (e.g., #winners) to ensure the cinematic intro starts from a clean Slate
    if (window.location.hash) {
      history.replaceState('', document.title, window.location.pathname + window.location.search);
    }
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
